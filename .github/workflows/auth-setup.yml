name: Auth Setup Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 0 */3 * *'  # Every 3 days at 00:00 UTC (midnight)
  workflow_dispatch: # Allow manual trigger

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Auth Setup Tests
        run: npm run test:setup
        env:
          # Base URL
          QA_URL: ${{ secrets.QA_URL }}

          # Admin credentials
          QA_ADMIN_ONE_USERNAME: ${{ secrets.QA_ADMIN_ONE_USERNAME }}
          QA_ADMIN_TWO_USERNAME: ${{ secrets.QA_ADMIN_TWO_USERNAME }}
          QA_ADMIN_PASSWORD: ${{ secrets.QA_ADMIN_PASSWORD }}

          # Provider credentials
          QA_PROVIDER_ONE_USERNAME: ${{ secrets.QA_PROVIDER_ONE_USERNAME }}
          QA_PROVIDER_TWO_USERNAME: ${{ secrets.QA_PROVIDER_TWO_USERNAME }}
          QA_PROVIDER_PASSWORD: ${{ secrets.QA_PROVIDER_PASSWORD }}

          # Patient credentials
          QA_PATIENT_ONE_USERNAME: ${{ secrets.QA_PATIENT_ONE_USERNAME }}
          QA_PATIENT_TWO_USERNAME: ${{ secrets.QA_PATIENT_TWO_USERNAME }}
          QA_PATIENT_PASSWORD: ${{ secrets.QA_PATIENT_PASSWORD }}

          # Coordinator credentials
          QA_COORDINATOR_ONE_USERNAME: ${{ secrets.QA_COORDINATOR_ONE_USERNAME }}
          QA_COORDINATOR_TWO_USERNAME: ${{ secrets.QA_COORDINATOR_TWO_USERNAME }}
          QA_COORDINATOR_PASSWORD: ${{ secrets.QA_COORDINATOR_PASSWORD }}

          # Device IDs
          QA_DEVICE_ONE_ID: ${{ secrets.QA_DEVICE_ONE_ID }}
          QA_DEVICE_TWO_ID: ${{ secrets.QA_DEVICE_TWO_ID }}

          # Combined role credentials
          QA_ADMINCOORDINATOR_USERNAME: ${{ secrets.QA_ADMINCOORDINATOR_USERNAME }}
          QA_ADMINCOORDINATOR_PASSWORD: ${{ secrets.QA_ADMINCOORDINATOR_PASSWORD }}
          QA_PROVIDERADMIN_USERNAME: ${{ secrets.QA_PROVIDERADMIN_USERNAME }}
          QA_PROVIDERADMIN_PASSWORD: ${{ secrets.QA_PROVIDERADMIN_PASSWORD }}
          QA_PROVIDERCOORDINATOR_USERNAME: ${{ secrets.QA_PROVIDERCOORDINATOR_USERNAME }}
          QA_PROVIDERCOORDINATOR_PASSWORD: ${{ secrets.QA_PROVIDERCOORDINATOR_PASSWORD }}
          QA_PROVIDERADMINCOORDINATOR_USERNAME: ${{ secrets.QA_PROVIDERADMINCOORDINATOR_USERNAME }}
          QA_PROVIDERADMINCOORDINATOR_PASSWORD: ${{ secrets.QA_PROVIDERADMINCOORDINATOR_PASSWORD }}

          # Super Admin credentials
          QA_SUPERADMIN_USERNAME: ${{ secrets.QA_SUPERADMIN_USERNAME }}
          QA_SUPERADMIN_PASSWORD: ${{ secrets.QA_SUPERADMIN_PASSWORD }}

      - name: Generate Allure Report
        if: ${{ !cancelled() }}
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      - name: Deploy to GitHub Pages
        if: ${{ !cancelled() && github.ref == 'refs/heads/main' }}
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: auth-setup
          keep_files: true

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-auth-setup
          path: playwright-report/
          retention-days: 30

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results-auth-setup
          path: test-results/
          retention-days: 30

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: allure-results-auth-setup
          path: allure-results/
          retention-days: 30
